name: Post Weekly Publix Sub Deal

on:
  schedule:
    # Runs hourly from 9:00-23:00 UTC every Wednesday (~4am-6pm US Eastern).
    # The script is safe to run repeatedly — it skips posting if this
    # week's deal was already posted, so this just catches the update
    # whenever it actually lands.
    - cron: '0 9-23 * * 3'
  workflow_dispatch:   # lets you trigger it manually from the Actions tab
    inputs:
      force:
        description: 'Force a re-post even if this week was already posted (for testing)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write   # needed so the workflow can commit the updated state.json

jobs:
  post-deal:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FORCE_POST: ${{ github.event.inputs.force }}
        run: node post-weekly-deals.js

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update last posted week"
          git push
