name: Post Weekly Publix Sub Deal

on:
  schedule:
    # PRIMARY WINDOW: every 15 minutes, Fri & Sat, 12:00-23:45 UTC.
    # That's ~8am-7:45pm US Eastern (EDT) or ~7am-6:45pm (EST) — a wide
    # buffer around the observed "Friday/Saturday, around 5pm" update time,
    # wide enough to not drift wrong across daylight saving changes.
    - cron: '*/15 12-23 * * 5,6'
    # SAFETY NET: once a day the rest of the week, in case it occasionally
    # updates on an atypical day. The script is safe to run repeatedly —
    # it skips posting if this week's deal was already posted, so both
    # schedules below just catch the update whenever it actually lands.
    - cron: '0 18 * * 0,1,2,3,4'
  workflow_dispatch:   # lets you trigger it manually from the Actions tab
    inputs:
      force:
        description: 'Force a re-post even if this week was already posted (for testing)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write   # needed so the workflow can commit the updated state.json

jobs:
  post-deal:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FORCE_POST: ${{ github.event.inputs.force }}
        run: node post-weekly-deals.js

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update last posted week"
          git push
